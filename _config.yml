title: Mercor Affiliate Blog
description: Remote job breakdowns across 11 categories
url: "https://vinaybhagatd.github.io"
baseurl: "/mercor-affiliate-blog"

markdown: kramdown
highlighter: rouge

theme: minima

plugins:
  - jekyll-feed
  - jekyll-seo-tag

collections:
  categories:
    output: true

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - .github
  - .gitignore
